<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} - Install Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a10;--surface:#11131d;--surface2:#181b27;--border:#232638;--accent:#6c5ce7;--green:#00b894;--blue:#74b9ff;--yellow:#fdcb6e;--red:#e17055;--text:#e0e0e8;--muted:#888;--dim:#555;--code-bg:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:20px 20px 80px}

/* BOOKMARK BANNER */
.bookmark-banner{background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:12px;padding:20px 24px;margin-bottom:24px;text-align:center}
.bookmark-banner h2{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.bookmark-banner p{font-size:13px;color:rgba(255,255,255,.8)}
.bookmark-banner .shortcut{display:inline-block;background:rgba(0,0,0,.25);padding:3px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#fff;margin-top:6px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:20px;display:flex;gap:4px;flex-wrap:wrap}
.nav a{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;transition:all .15s;white-space:nowrap}
.nav a:hover{background:var(--surface);color:var(--text)}
.nav a.active{background:var(--accent);color:#fff}

/* PROGRESS */
.progress-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px}
.progress-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.progress-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s}
.progress-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:right}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* SUMMARY STATS */
.stat{text-align:center;padding:14px;background:var(--surface2);border-radius:10px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:2px}

/* SCORE IMPACT */
.score-impact{display:flex;align-items:center;gap:16px;padding:16px;background:var(--surface2);border-radius:10px}
.score-before{font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--muted)}
.score-arrow{font-size:20px;color:var(--green)}
.score-after{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800;color:var(--green)}
.score-delta{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--green);background:rgba(0,184,148,.12);padding:2px 10px;border-radius:6px}

/* PHASE CARDS */
.phase{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.phase.locked{opacity:.6}
.phase.active{border-color:var(--accent)}
.phase.complete{border-color:var(--green)}
.phase-header{padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer}
.phase-header:hover{background:var(--surface2)}
.phase-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface2);color:var(--muted)}
.phase.active .phase-num{background:var(--accent);color:#fff}
.phase.complete .phase-num{background:var(--green);color:#000}
.phase-info{flex:1}
.phase-name{font-size:15px;font-weight:700}
.phase-meta{font-size:12px;color:var(--muted);margin-top:2px}
.phase-status{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:700}
.phase-status.not-started{background:var(--surface2);color:var(--dim)}
.phase-status.in-progress{background:rgba(108,92,231,.15);color:var(--accent)}
.phase-status.complete{background:rgba(0,184,148,.15);color:var(--green)}
.phase-body{padding:0 20px 20px;display:none}
.phase.open .phase-body{display:block}

/* PREREQUISITES */
.prereq{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.prereq-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prereq-dot.met{background:var(--green)}
.prereq-dot.unmet{background:var(--red)}

/* TASK CHECKLIST */
.task{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.task-check:hover{border-color:var(--green)}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-check.checked::after{content:'check';font-family:'JetBrains Mono';font-size:11px;color:#000;font-weight:800}
.task-text{font-size:13px;flex:1}
.task.done .task-text{text-decoration:line-through;color:var(--dim)}

/* BENEFIT/RISK CARDS */
.br-card{padding:14px 16px;border-radius:10px;margin-bottom:10px}
.br-card.benefit{background:rgba(0,184,148,.08);border-left:4px solid var(--green)}
.br-card.risk{background:rgba(225,112,85,.08);border-left:4px solid var(--red)}
.br-title{font-size:13px;font-weight:700;margin-bottom:4px}
.br-desc{font-size:12px;color:var(--muted)}

/* FILE TABLE */
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.file-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.file-table .type-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface2)}

/* CODE BLOCKS */
pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin:10px 0;overflow-x:auto;position:relative;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;color:#c9d1d9}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--text);border-color:var(--accent)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.5px}
.badge.critical{background:rgba(225,112,85,.2);color:var(--red)}
.badge.high{background:rgba(253,203,110,.2);color:var(--yellow)}
.badge.medium{background:rgba(116,185,255,.2);color:var(--blue)}
.badge.low{background:rgba(0,184,148,.2);color:var(--green)}
.badge.safe{background:rgba(0,184,148,.2);color:var(--green)}

/* NOTES */
.note{font-size:13px;color:var(--muted);padding:10px 14px;background:rgba(108,92,231,.08);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;margin:10px 0}
.warn-box{font-size:13px;color:var(--red);padding:10px 14px;background:rgba(225,112,85,.08);border-left:3px solid var(--red);border-radius:0 8px 8px 0;margin:10px 0}

/* SECTION HEADERS */
h2.section{font-size:18px;font-weight:800;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
h3{font-size:14px;font-weight:700;margin:14px 0 8px}

/* UPGRADE LIST */
.upgrade-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.upgrade-item:last-child{border-bottom:none}
.upgrade-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800}
.upgrade-icon.added{background:rgba(0,184,148,.15);color:var(--green)}
.upgrade-icon.fixed{background:rgba(253,203,110,.15);color:var(--yellow)}
.upgrade-icon.removed{background:rgba(225,112,85,.15);color:var(--red)}

@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">

  <!-- BOOKMARK BANNER -->
  <div class="bookmark-banner">
    <h2>BOOKMARK THIS PAGE</h2>
    <p>Keep this open in your browser until all phases are complete.</p>
    <span class="shortcut">Ctrl+D to bookmark</span>
  </div>

  <!-- TEMPLATE SECTIONS BELOW — skill populates dynamically -->
  <!-- {{CONTENT}} -->

</div>

<script>
// Shared utilities for all dashboards generated by this skill

function copyCode(btn) {
  const pre = btn.parentElement;
  const text = pre.textContent.replace('Copy','').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function togglePhase(id) {
  document.getElementById(id).classList.toggle('open');
}

function checkTask(el) {
  el.classList.toggle('checked');
  const task = el.closest('.task');
  if (task) task.classList.toggle('done');
  updateProgress();
}

function updateProgress() {
  const total = document.querySelectorAll('.task-check').length;
  const done = document.querySelectorAll('.task-check.checked').length;
  const pct = total > 0 ? (done / total) * 100 : 0;
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = done + ' / ' + total + ' tasks (' + Math.round(pct) + '%)';
  checkPhasePrereqs();
}

function checkPhasePrereqs() {
  // Auto-unlock phases when prerequisites are met
  document.querySelectorAll('.phase.locked').forEach(phase => {
    const prereqs = phase.querySelectorAll('.prereq-dot');
    const allMet = Array.from(prereqs).every(d => d.classList.contains('met'));
    if (allMet && prereqs.length > 0) {
      phase.classList.remove('locked');
      phase.classList.add('active');
      const status = phase.querySelector('.phase-status');
      if (status) {
        status.className = 'phase-status in-progress';
        status.textContent = 'UNLOCKED';
      }
    }
  });
}

function scrollNav(el) {
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
